name: Supabase Keep-Alive

# Runs every 5 days to prevent Supabase free-tier auto-pause.
# Supabase pauses projects after 7 days of inactivity — this
# ensures the database always sees activity regardless of site traffic.
on:
  schedule:
    - cron: '0 9 */5 * *'   # every 5 days at 9am UTC
  workflow_dispatch:          # also runnable manually from GitHub Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://azjwuraxixuioeddkicq.supabase.co/rest/v1/adventures?select=id&limit=1" \
            -H "apikey: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF6and1cmF4aXh1aW9lZGRraWNxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0MTM4MTMsImV4cCI6MjA5Njk4OTgxM30._GuEJWGiRHktIeX6ukleM2s07V_W6pbMxIV8ntXjy44" \
            -H "Authorization: Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF6and1cmF4aXh1aW9lZGRraWNxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0MTM4MTMsImV4cCI6MjA5Njk4OTgxM30._GuEJWGiRHktIeX6ukleM2s07V_W6pbMxIV8ntXjy44")
          echo "Supabase responded: HTTP $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Warning: unexpected status $STATUS — project may be paused"
            exit 1
          fi
